<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Portfolio d'Alex - Sélection de langue">
<title>Portfolio d'Alex</title>
<link rel="stylesheet" href="styles.css">
<script>
  // Rediriger automatiquement vers home.html si une langue est déjà sélectionnée
  if (localStorage.getItem('language')) {
    window.location.href = 'home.html';
  }
</script>
</head>
<body class="language-selection-page">
  <div class="language-selection-container">
    <h1>Choisissez votre langue / Choose your language / Выберите язык / Dilinizi seçin</h1>
    <div class="language-options">
      <div class="language-option" data-lang="fr">
        <div class="flag fr"></div>
        <div class="lang-name">Français</div>
      </div>
      <div class="language-option" data-lang="en">
        <div class="flag en"></div>
        <div class="lang-name">English</div>
      </div>
      <div class="language-option" data-lang="ru">
        <div class="flag ru"></div>
        <div class="lang-name">Русский</div>
      </div>
      <div class="language-option" data-lang="tr">
        <div class="flag tr"></div>
        <div class="lang-name">Türkçe</div>
      </div>
    </div>
  </div>

  <script>
    // Gestionnaire de sélection de langue
    document.querySelectorAll('.language-option').forEach(option => {
      option.addEventListener('click', function() {
        const selectedLang = this.getAttribute('data-lang');
        localStorage.setItem('language', selectedLang);
        window.location.href = 'home.html';
      });
    });
  </script>
</body>
</html>
