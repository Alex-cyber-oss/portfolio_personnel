<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="description" content="Portfolio d'Alex, étudiant en IA et Big Data, passionné par le développement web.">
<title>Portfolio d'Alex</title>
<link rel="stylesheet" href="styles.css">
<script>
  // Rediriger automatiquement vers home.html si une langue est déjà sélectionnée
  if (localStorage.getItem('language')) {
    window.location.href = 'home.html';
  }
</script>
</head>
<body>
  <div class="language-selection">
    <h1>Choisissez votre langue / Choose your language / Выберите язык / Dilinizi seçin</h1>
    <div class="language-options">
      <div class="language-option" onclick="selectLanguage('fr')">
        <span class="flag">🇫🇷</span>
        <span class="lang-name">Français</span>
      </div>
      <div class="language-option" onclick="selectLanguage('en')">
        <span class="flag">🇬🇧</span>
        <span class="lang-name">English</span>
      </div>
      <div class="language-option" onclick="selectLanguage('ru')">
        <span class="flag">🇷🇺</span>
        <span class="lang-name">Русский</span>
      </div>
      <div class="language-option" onclick="selectLanguage('tr')">
        <span class="flag">🇹🇷</span>
        <span class="lang-name">Türkçe</span>
      </div>
    </div>
  </div>

  <script>
    function selectLanguage(lang) {
      localStorage.setItem('language', lang);
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
