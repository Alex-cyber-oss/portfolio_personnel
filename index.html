<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio d'Alex, étudiant en IA et Big Data, passionné par le développement web.">
    <title>Choix de la langue - Portfolio d'Alex</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .language-selector-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .language-container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
        }

        .language-container h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 2.5em;
        }

        .language-container p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 50px;
        }

        .language-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 30px;
        }

        .language-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
        }

        .language-option:hover {
            border-color: #00d4b1;
            background-color: #f5f5f5;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 177, 0.2);
        }

        .language-flag {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .language-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .language-native {
            font-size: 0.9em;
            color: #999;
            margin-top: 5px;
        }

        .language-continue {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .language-options {
                grid-template-columns: 1fr;
            }

            .language-container {
                padding: 40px 20px;
            }

            .language-container h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="language-selector-page">
        <div class="language-container">
            <h1>Bienvenue</h1>
            <p>Veuillez choisir votre langue</p>

            <div class="language-options">
                <a href="#" class="language-option" data-lang="fr">
                    <div class="language-flag">🇫🇷</div>
                    <div class="language-name">Français</div>
                </a>

                <a href="#" class="language-option" data-lang="en">
                    <div class="language-flag">🇬🇧</div>
                    <div class="language-name">English</div>
                    <div class="language-native">English</div>
                </a>

                <a href="#" class="language-option" data-lang="ru">
                    <div class="language-flag">🇷🇺</div>
                    <div class="language-name">Русский</div>
                    <div class="language-native">Русский</div>
                </a>

                <a href="#" class="language-option" data-lang="tr">
                    <div class="language-flag">🇹🇷</div>
                    <div class="language-name">Türkçe</div>
                    <div class="language-native">Türkçe</div>
                </a>
            </div>

            <div class="language-continue">
                <p>Vous serez automatiquement redirigé vers le portfolio</p>
            </div>
        </div>
    </div>

    <script>
        // Si une langue est déjà sélectionnée, rediriger vers l'accueil
        if (localStorage.getItem('language')) {
            window.location.href = 'home.html';
        }

        // Gestionnaire simple pour la page de sélection de langue
        document.querySelectorAll('[data-lang]').forEach(option => {
            option.addEventListener('click', (e) => {
                e.preventDefault();
                const lang = option.getAttribute('data-lang');
                localStorage.setItem('language', lang);
                window.location.href = 'home.html';
            });
        });
    </script>
</body>
</html>
