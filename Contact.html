<p class="accroche-contact">Une idée, un besoin, un projet ou juste pour discuter? Je suis à votre écoute.</p>
   <section class="formulaire-contact">
  <form id="contactForm">
    <label for="nom">Nom :</label>
    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

    <label for="email">Email :</label>
    <input type="email" id="email" name="email" placeholder="Votre email" required>

    <label for="sujet">Sujet :</label>
    <input type="text" id="sujet" name="sujet" placeholder="Sujet du message" required>

    <label for="message">Message :</label>
    <textarea id="message" name="message" rows="5" placeholder="Votre message ici..." required></textarea>

    <button type="submit">Envoyer</button>
  </form>
</section>
